name: Release check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: pnpm release:check

      - name: Run Docker release gate
        run: VITE_DEPLOY_VERSION=ci-${{ github.sha }} pnpm release:docker
