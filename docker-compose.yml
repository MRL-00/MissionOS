services:
  missionos:
    build:
      context: .
      args:
        VITE_DEPLOY_VERSION: ${VITE_DEPLOY_VERSION:-vlocal}
    container_name: missionos
    restart: unless-stopped
    ports:
      - "${MISSIONOS_HOST:-0.0.0.0}:${MISSIONOS_PORT:-3001}:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set for production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - OPENCLAW_URL=${OPENCLAW_URL:-}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-}
      - HERMES_URL=${HERMES_URL:-}
      - HERMES_WS_URL=${HERMES_WS_URL:-}
      - HERMES_RUNTIME_URL=${HERMES_RUNTIME_URL:-}
      - HERMES_TOKEN=${HERMES_TOKEN:-}
      - LINEAR_API_URL=${LINEAR_API_URL:-https://api.linear.app/graphql}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - LINEAR_SYNC_INTERVAL_MS=${LINEAR_SYNC_INTERVAL_MS:-30000}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - office-data:/app/server/data
volumes:
  office-data:
