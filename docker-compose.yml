services:
  the-office:
    build: .
    container_name: the-office
    restart: unless-stopped
    ports:
      - "5173:5173"
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - OPENCLAW_URL=${OPENCLAW_URL:-}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-}
    volumes:
      - office-data:/app/data
volumes:
  office-data:
