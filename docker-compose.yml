services:
  the-office:
    build: .
    container_name: the-office
    restart: unless-stopped
    ports:
      - "5173:5173"
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - office-data:/app/data
  office-sync:
    build: .
    container_name: the-office-sync
    profiles: ["external-sync"]
    restart: unless-stopped
    depends_on:
      - the-office
    command: ["npx", "tsx", "scripts/office-sync.ts"]
    env_file:
      - .env
volumes:
  office-data:
